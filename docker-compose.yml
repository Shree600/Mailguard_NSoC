# ================================================
# MAILGUARD - DOCKER COMPOSE CONFIGURATION
# ================================================
# Full stack deployment with:
# - MongoDB database
# - Node.js backend API
# - FastAPI ML service
# - React frontend (nginx)
#
# Usage:
#   docker compose up --build    # Build and start all services
#   docker compose down          # Stop and remove containers
#   docker compose logs -f       # View logs from all services
# ================================================

services:
  # ================================================
  # MONGODB DATABASE
  # ================================================
  mongo:
    image: mongo:7-jammy
    container_name: mailguard-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mailguard
      # SECURITY: Enable authentication in production
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_this_password}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - mailguard-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" , "--host", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ================================================
  # ML SERVICE (FASTAPI)
  # ================================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: mailguard-ml
    restart: unless-stopped
    environment:
      # Configure paths for volume persistence
      - MODEL_DIR=/app/models
      - DATASET_DIR=/app/datasets
      # Node environment for CORS configuration
      - NODE_ENV=${NODE_ENV:-development}
      # CORS origins (comma-separated URLs)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}
    ports:
      - "8000:8000"
    volumes:
      # Persist trained models and datasets
      - ml-models:/app/models
      - ml-datasets:/app/datasets
    networks:
      - mailguard-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ================================================
  # BACKEND API (NODE.JS + EXPRESS)
  # ================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailguard-backend
    restart: unless-stopped
    environment:
      # Node environment
      - NODE_ENV=production
      # Database
      - MONGO_URI=${MONGO_URI:-mongodb://admin:change_this_password@mongo:27017/mailguard?authSource=admin}
      # Clerk Authentication
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Gmail OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # Encryption
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # ML Service
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8000}
      # Server Configuration
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # Optional: Scheduler Configuration
      - RETRAIN_SCHEDULE=${RETRAIN_SCHEDULE:-0 2 * * *}
      - SCAN_SCHEDULE=${SCAN_SCHEDULE:-0 2 * * *}
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - mailguard-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ================================================
  # FRONTEND (REACT + NGINX)
  # ================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000/api}
    container_name: mailguard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mailguard-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ================================================
# NETWORKS
# ================================================
networks:
  mailguard-network:
    driver: bridge
    name: mailguard-network

# ================================================
# VOLUMES
# ================================================
volumes:
  mongo-data:
    name: mailguard-mongo-data
  mongo-config:
    name: mailguard-mongo-config
  ml-models:
    name: mailguard-ml-models
  ml-datasets:
    name: mailguard-ml-datasets
